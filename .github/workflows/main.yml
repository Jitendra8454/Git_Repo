name: Create Azure Resource Group

on:
  workflow_dispatch:

jobs:
  create-rg:
    runs-on: self-hosted

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group
        run: |
          az group create \
            --name myResourceGroupDemo \
            --location eastus
